# 2026-07-16 — Worker source lives in thesolarproject/solar (this directory).
# Issues are filed on private thesolarproject/solar-diag (GITHUB_REPO).
# Secrets (never commit): GITHUB_TOKEN, INGEST_TOKEN
#   cd cloudflare/solar-diag && npx wrangler secret put GITHUB_TOKEN
#   cd cloudflare/solar-diag && npx wrangler secret put INGEST_TOKEN
name = "solar-diag"
main = "src/index.js"
compatibility_date = "2024-09-01"

[vars]
# Private issues destination — not thesolarproject/solar
GITHUB_REPO = "thesolarproject/solar-diag"
MAX_BODY_BYTES = "2097152"
