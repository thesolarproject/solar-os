name: Sync OTA catalog to solar-update

# ponytail: recovery when release build succeeded but OTA push failed (bad PAT mid-pipeline).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-ota:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify OTA PAT can push to solar-update
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          chmod +x scripts/verify-ota-pat.sh
          ./scripts/verify-ota-pat.sh

      - name: Configure solar-update Pages (branch deploy)
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          chmod +x scripts/configure-solar-update-pages.sh
          ./scripts/configure-solar-update-pages.sh

      - name: Sync APKs from GitHub releases
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          chmod +x scripts/publish-ota-updates.sh
          ./scripts/publish-ota-updates.sh sync-from-releases
