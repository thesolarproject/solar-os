name: Build Solar APK and ROMs

on:
  push:
    branches: [main, nightly]
  workflow_dispatch:

permissions:
  contents: write

env:
  SOLAR_GITHUB_REPO: thesolarproject/solar

concurrency:
  group: solar-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x solar-rom/scripts/prepare-release.sh \
            solar-rom/scripts/bump-stable-version.sh \
            solar-rom/scripts/bump-nightly-version.sh \
            solar-rom/scripts/resolve-release-version.py
          python3 solar-rom/scripts/resolve-release-version.py --self-test
          ./solar-rom/scripts/prepare-release.sh

      - name: Verify OTA PAT can reach solar-update
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          if [ -z "$SOLAR_GITHUB_PAT" ]; then
            echo "::error::SOLAR_GITHUB_PAT secret is missing — rotate or add a PAT with Contents read/write on thesolarproject/solar-update repo."
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${SOLAR_GITHUB_PAT}@github.com/thesolarproject/solar-update.git" HEAD >/dev/null 2>&1; then
            echo "::error::SOLAR_GITHUB_PAT cannot read thesolarproject/solar-update — rotate the repo secret (needs Contents read/write on solar-update)."
            exit 128
          fi
          echo "solar-update PAT preflight OK"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install ROM build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y unzip zip e2fsprogs curl util-linux kmod openssl android-sdk-libsparse-utils
          sudo modprobe loop || true

      - name: Verify ROM base firmware URLs
        run: |
          curl -fsSIL -o /dev/null "https://github.com/rockbox-y1/rockbox/releases/download/type-a-base/rom.zip"
          curl -fsSIL -o /dev/null "https://github.com/rockbox-y1/rockbox/releases/download/type-b-base/rom.zip"
          echo "ROM base sources OK (Y1 type A/B)"

      - name: Decode platform signing keys
        env:
          KEY_PK8_B64: ${{ secrets.SOLAR_PLATFORM_KEY_PK8_B64 }}
          KEY_PEM_B64: ${{ secrets.SOLAR_PLATFORM_KEY_PEM_B64 }}
        run: |
          if [ -z "$KEY_PK8_B64" ] || [ -z "$KEY_PEM_B64" ]; then
            echo "::error::Set SOLAR_PLATFORM_KEY_PK8_B64 and SOLAR_PLATFORM_KEY_PEM_B64 repo secrets"
            exit 1
          fi
          mkdir -p .ci-keys
          printf '%s' "$KEY_PK8_B64" | base64 -d > .ci-keys/platform.pk8
          printf '%s' "$KEY_PEM_B64" | base64 -d > .ci-keys/platform.x509.pem
          echo "SOLAR_PLATFORM_KEY_PK8=$GITHUB_WORKSPACE/.ci-keys/platform.pk8" >> "$GITHUB_ENV"
          echo "SOLAR_PLATFORM_KEY_PEM=$GITHUB_WORKSPACE/.ci-keys/platform.x509.pem" >> "$GITHUB_ENV"

      - name: Sync and verify Y1 scripts (ROM sources → APK assets)
        run: |
          chmod +x solar-rom/scripts/sync-y1-assets.sh solar-rom/scripts/verify-y1-assets.sh
          ./solar-rom/scripts/sync-y1-assets.sh

      - name: Build signed release APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          chmod +x gradlew scripts/build.sh
          ./scripts/build.sh

      - name: Build ROM images
        env:
          SOLAR_GITHUB_REPO: thesolarproject/solar
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          mkdir -p dist
          chmod +x solar-rom/scripts/build-rom.sh
          ./solar-rom/scripts/build-rom.sh a --apk "$APK" "$GITHUB_WORKSPACE/dist/rom.zip"
          ./solar-rom/scripts/build-rom.sh b --apk "$APK" "$GITHUB_WORKSPACE/dist/rom_type_b.zip"
          ls -la dist/
          for z in dist/rom.zip dist/rom_type_b.zip; do
            test -s "$z" || { echo "::error::Missing or empty $z"; exit 1; }
          done
          unzip -l dist/rom.zip | grep -q MT6572_Android_scatter.txt
          unzip -l dist/rom_type_b.zip | grep -q MT6572_Android_scatter.txt
          echo "Y1 type A/B ROM zips built and verified"

      - name: Prepare release notes
        run: ./solar-rom/scripts/format-release-notes.sh release.json > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Solar ${{ steps.meta.outputs.version_name }} (${{ steps.meta.outputs.short_sha }})
          body_path: RELEASE_NOTES.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            dist/rom.zip
            dist/rom_type_b.zip
          fail_on_unmatched_files: true
          make_latest: ${{ github.ref == 'refs/heads/main' }}
          prerelease: ${{ github.ref == 'refs/heads/nightly' }}
          generate_release_notes: false

      - name: Publish OTA catalog
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          if [ -z "$SOLAR_GITHUB_PAT" ]; then
            echo "::error::SOLAR_GITHUB_PAT secret is missing — OTA publish to thesolarproject/solar-update requires a PAT with repo write access."
            exit 1
          fi
          chmod +x scripts/publish-ota-updates.sh
          NIGHTLY=false
          if [ "${{ github.ref }}" = "refs/heads/nightly" ]; then NIGHTLY=true; fi
          ./scripts/publish-ota-updates.sh add \
            --apk app/build/outputs/apk/release/app-release.apk \
            --tag "${{ steps.meta.outputs.tag }}" \
            --version-name "${{ steps.meta.outputs.version_name }}" \
            --version-code "${{ steps.meta.outputs.version_code }}" \
            $([ "$NIGHTLY" = true ] && echo --nightly)

      - name: Bump stable version for next release
        if: github.ref == 'refs/heads/main'
        run: ./solar-rom/scripts/bump-stable-version.sh

      - name: Commit stable version bump
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          git config user.name "thesolarproject"
          git config user.email "anonymous@local"
          git add app/build.gradle
          if git diff --staged --quiet; then
            echo "No version bump to commit"
            exit 0
          fi
          git commit -m "Bump stable version for next release."
          git push "https://x-access-token:${GH_TOKEN}@github.com/thesolarproject/solar.git" HEAD:main

      - name: Bump nightly version for next release
        if: github.ref == 'refs/heads/nightly'
        run: ./solar-rom/scripts/bump-nightly-version.sh

      - name: Commit nightly version bump
        if: github.ref == 'refs/heads/nightly'
        env:
          GH_TOKEN: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          git config user.name "thesolarproject"
          git config user.email "anonymous@local"
          git add app/build.gradle
          if git diff --staged --quiet; then
            echo "No version bump to commit"
            exit 0
          fi
          git commit -m "Bump nightly version for next release."
          git push "https://x-access-token:${GH_TOKEN}@github.com/thesolarproject/solar.git" HEAD:nightly

      - name: Remove signing keys
        if: always()
        run: rm -rf .ci-keys
