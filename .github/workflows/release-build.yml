name: Release build

on:
  workflow_call:
    inputs:
      channel:
        description: Release channel (nightly or stable)
        required: true
        type: string

permissions:
  contents: write

env:
  SOLAR_GITHUB_REPO: thesolarproject/solar
  SOLAR_ROM_BASE_CACHE: ${{ github.workspace }}/.ci-cache/rockbox-bases
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          chmod +x solar-rom/scripts/prepare-release.sh solar-rom/scripts/bump-stable-version.sh
          ./solar-rom/scripts/prepare-release.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install ROM build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip e2fsprogs curl util-linux kmod openssl
          sudo modprobe loop || true

      - name: Cache Rockbox-Y1 base firmware
        uses: actions/cache@v4
        with:
          path: .ci-cache/rockbox-bases
          key: rockbox-bases-v1
          restore-keys: |
            rockbox-bases-

      - name: Decode platform signing keys
        env:
          KEY_PK8_B64: ${{ secrets.SOLAR_PLATFORM_KEY_PK8_B64 }}
          KEY_PEM_B64: ${{ secrets.SOLAR_PLATFORM_KEY_PEM_B64 }}
        run: |
          if [ -z "$KEY_PK8_B64" ] || [ -z "$KEY_PEM_B64" ]; then
            echo "::error::Set SOLAR_PLATFORM_KEY_PK8_B64 and SOLAR_PLATFORM_KEY_PEM_B64 repo secrets"
            exit 1
          fi
          mkdir -p .ci-keys
          printf '%s' "$KEY_PK8_B64" | base64 -d > .ci-keys/platform.pk8
          printf '%s' "$KEY_PEM_B64" | base64 -d > .ci-keys/platform.x509.pem
          echo "SOLAR_PLATFORM_KEY_PK8=$GITHUB_WORKSPACE/.ci-keys/platform.pk8" >> "$GITHUB_ENV"
          echo "SOLAR_PLATFORM_KEY_PEM=$GITHUB_WORKSPACE/.ci-keys/platform.x509.pem" >> "$GITHUB_ENV"

      - name: Checkout AVRCP patches
        uses: actions/checkout@v4
        with:
          repository: SeanathanVT/koensayr
          path: solar-rom/koensayr
          fetch-depth: 1

      - name: Build signed release APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          SOLAR_ROM_BASE_CACHE: ${{ env.SOLAR_ROM_BASE_CACHE }}
        run: |
          chmod +x gradlew scripts/build.sh scripts/extract-avrcp-stock-sys.sh scripts/stage-avrcp-prep.sh
          chmod +x solar-rom/scripts/avrcp-apply-to-tree.sh
          ./scripts/build.sh

      - name: Build ROM images
        env:
          SOLAR_GITHUB_REPO: thesolarproject/solar
          SOLAR_ROM_BASE_CACHE: ${{ env.SOLAR_ROM_BASE_CACHE }}
        run: |
          APK="$GITHUB_WORKSPACE/app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          mkdir -p dist
          chmod +x solar-rom/scripts/build-rom.sh
          ./solar-rom/scripts/build-rom.sh a --apk "$APK" "$GITHUB_WORKSPACE/dist/rom.zip"
          ./solar-rom/scripts/build-rom.sh b --apk "$APK" "$GITHUB_WORKSPACE/dist/rom_type_b.zip"
          ls -la dist/

      - name: Prepare release notes
        run: ./solar-rom/scripts/format-release-notes.sh release.json > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Solar ${{ steps.meta.outputs.version_name }} (${{ steps.meta.outputs.short_sha }})
          body_path: RELEASE_NOTES.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            dist/rom.zip
            dist/rom_type_b.zip
          fail_on_unmatched_files: true
          make_latest: ${{ inputs.channel == 'stable' }}
          prerelease: ${{ inputs.channel == 'nightly' }}
          generate_release_notes: false

      - name: Publish OTA catalog
        env:
          SOLAR_GITHUB_PAT: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          chmod +x scripts/publish-ota-updates.sh
          ./scripts/publish-ota-updates.sh add \
            --apk app/build/outputs/apk/release/app-release.apk \
            --tag "${{ steps.meta.outputs.tag }}" \
            --version-name "${{ steps.meta.outputs.version_name }}" \
            --version-code "${{ steps.meta.outputs.version_code }}" \
            $([ "${{ inputs.channel }}" = "nightly" ] && echo --nightly)

      - name: Bump stable version for next release
        if: inputs.channel == 'stable'
        run: ./solar-rom/scripts/bump-stable-version.sh

      - name: Commit stable version bump
        if: inputs.channel == 'stable'
        env:
          GH_TOKEN: ${{ secrets.SOLAR_GITHUB_PAT }}
        run: |
          git config user.name "thesolarproject"
          git config user.email "anonymous@local"
          git add app/build.gradle
          if git diff --staged --quiet; then
            echo "No version bump to commit"
            exit 0
          fi
          git commit -m "Bump stable version for next release. [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/thesolarproject/solar.git" HEAD:main

      - name: Remove signing keys
        if: always()
        run: rm -rf .ci-keys
