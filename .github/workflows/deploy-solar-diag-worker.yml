# 2026-07-16 — Deploy solar-diag Worker from thesolarproject/solar.
# Issues still open on private thesolarproject/solar-diag (Worker GITHUB_TOKEN secret).
# Required repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Worker secrets GITHUB_TOKEN + INGEST_TOKEN must already be set via wrangler once.
name: Deploy solar-diag Worker

on:
  push:
    branches: [main, nightly]
    paths:
      - 'cloudflare/solar-diag/**'
      - '.github/workflows/deploy-solar-diag-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: solar-diag-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloudflare/solar-diag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudflare/solar-diag/package.json

      - name: Install and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Skip deploy: set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets."
            exit 0
          fi
          npm install
          npx wrangler deploy
