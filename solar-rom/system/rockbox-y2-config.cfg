# Y2 dual-storage Rockbox config — seeded by sync-rockbox-assets.sh (Solar ROM).
# .rockbox tree lives on internal (/storage/sdcard0); default browse on MicroSD (/storage/sdcard1).
start directory: /storage/sdcard1/
lang: /storage/sdcard0/.rockbox/langs/english.lng
wheel vibration intensity: 15
idle poweroff: 15
font: /storage/sdcard0/.rockbox/fonts/24-Terminus-Bold.fnt
timestretch enabled: on
Timestretch mode: on
volume adjustment mode: perceptual
qs top: brightness
qs left: shuffle
qs right: repeat
qs bottom: brightness
